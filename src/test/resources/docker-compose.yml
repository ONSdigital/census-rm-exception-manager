version: '2.1'
services:
  postgres-exceptionmanager-it:
    container_name: postgres-exceptionmanager-it
    image: census-rm-dev-common-postgres:latest
    command: ["-c", "shared_buffers=256MB", "-c", "max_connections=500"]
    ports:
      - "15434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    external: true
    name: censusrmdockerdev_default
